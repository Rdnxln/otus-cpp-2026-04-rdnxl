name: 'C++ CI'

on:
  push:
    branches:
      - master
      - feature/github_actions
      - HW02

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Обновлено до v4 (использует Node.js 20)
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libboost-test-dev -y

      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON

      - name: Build
        run: cmake --build .

      - name: Run Tests
        run: cmake --build . --target test

      - name: Package
        run: cmake --build . --target package

      # Создание релиза и загрузка артефакта через один современный экшен
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Release 0.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: ./ip_filter-0.0.${{ github.run_number }}-Linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
